name: Publish container image

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "ariadne version to package (e.g. 0.3.0)"
        required: true

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: ARIADNE_VERSION=${{ steps.version.outputs.value }}
          tags: |
            ghcr.io/mikhailhal/ariadne:${{ steps.version.outputs.value }}
            ghcr.io/mikhailhal/ariadne:latest
